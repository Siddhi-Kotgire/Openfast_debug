name: OpenFAST Debugging Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  debug_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran libblas-dev liblapack-dev gdb tmate

    - name: Configure CMake (Debug Mode)
      # We add extra Fortran flags to catch common bugs like array-out-of-bounds
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_SHARED_LIBS=OFF \
          -DCMAKE_Fortran_FLAGS="-g -fbacktrace -fcheck=all -ffpe-trap=zero,invalid,overflow"

    - name: Build OpenFAST
      run: cmake --build build --parallel $(nproc)

    - name: Run Test with GDB
      # Replace 'input_file.fst' with a small test case path
      # This will run OpenFAST and, if it crashes, print the stack trace (bt)
      run: |
        cd build
        gdb -ex "run" -ex "bt" -ex "quit" --args ./glue-codes/openfast/openfast ../reg_tests/InputFiles/Test01.fst
      continue-on-error: true

    - name: Interactive Debugging on Failure
      # This step only triggers if any previous step fails.
      # It provides an SSH link in the logs so you can log in and debug live.
      if: failure()
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true